<header class="bg-slate-950 fixed w-full top-0 text-white shadow-md border-b border-slate-800">
  <div class="container mx-auto flex items-center justify-between py-5 px-6">
    <a routerLink="/" class="flex items-center space-x-2 group">
      <div
        class="h-8 w-2 bg-orange-500 rounded-full group-hover:scale-y-110 transition-transform duration-300"
      ></div>
      <p
        class="text-xl font-extrabold tracking-tight bg-linear-to-r from-white to-slate-300 bg-clip-text text-transparent"
      >
        Student Management System
      </p>
    </a>

    <nav class="flex items-center space-x-1 sm:space-x-2">
      <a
        routerLink="/"
        [routerLinkActiveOptions]="{ exact: true }"
        routerLinkActive="bg-orange-500 text-white shadow-lg shadow-orange-500/20"
        class="px-4 py-2 rounded-lg text-sm font-medium tracking-wide uppercase text-slate-300 hover:text-white hover:bg-slate-800 transition duration-300 ease-in-out"
      >
        Home
      </a>

      <a
        routerLink="/students"
        routerLinkActive="bg-orange-500 text-white shadow-lg shadow-orange-500/20"
        class="px-4 py-2 rounded-lg text-sm font-medium tracking-wide uppercase text-slate-300 hover:text-white hover:bg-slate-800 transition duration-300 ease-in-out"
      >
        Students
      </a>

      <a
        routerLink="/create"
        routerLinkActive="bg-orange-500 text-white shadow-lg shadow-orange-500/20"
        class="px-4 py-2 rounded-lg text-sm font-medium tracking-wide uppercase text-slate-300 hover:text-white hover:bg-slate-800 transition duration-300 ease-in-out"
      >
        Create Student
      </a>
    </nav>
  </div>
</header>
