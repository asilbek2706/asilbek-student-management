<header class="bg-slate-950/80 backdrop-blur-md fixed w-full top-0 text-white shadow-lg border-b border-slate-800/50 z-50 transition-all duration-300">
  <div class="max-w-7xl mx-auto flex items-center justify-between py-3.5 px-4 sm:px-6 lg:px-8">
    
    <a routerLink="/" class="flex items-center space-x-3 group outline-none">
      <div class="h-6 w-1.5 bg-orange-500 rounded-full shadow-lg shadow-orange-500/50 transition duration-300 group-hover:scale-y-110"></div>
      <p class="text-lg font-bold tracking-tight text-white hidden sm:block">
        Student<span class="text-orange-500">MS</span>
      </p>
      <p class="text-lg font-bold tracking-tight text-white sm:hidden">
        S<span class="text-orange-500">MS</span>
      </p>
    </a>

    <button 
      (click)="toggleMenu()" 
      class="md:hidden p-2 rounded-xl text-slate-400 hover:text-white hover:bg-slate-900 border border-transparent hover:border-slate-800 transition duration-200 focus:outline-none"
      aria-label="Toggle menu"
    >
      <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        @if (!isMenuOpen()) {
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        } @else {
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        }
      </svg>
    </button>

    <nav class="hidden md:flex items-center gap-1.5 p-1 bg-slate-900/40 border border-slate-800/60 rounded-xl backdrop-blur-sm shadow-inner">
      <a
        routerLink="/"
        [routerLinkActiveOptions]="{ exact: true }"
        routerLinkActive="bg-orange-500 text-white shadow-md shadow-orange-500/20"
        class="px-3.5 py-1.5 rounded-lg text-xs font-semibold tracking-wider uppercase text-slate-400 hover:text-white transition duration-200 outline-none"
      >
        Home
      </a>

      <a
        routerLink="/students"
        routerLinkActive="bg-orange-500 text-white shadow-md shadow-orange-500/20"
        class="px-3.5 py-1.5 rounded-lg text-xs font-semibold tracking-wider uppercase text-slate-400 hover:text-white transition duration-200 outline-none"
      >
        Students
      </a>

      <a
        routerLink="/create"
        routerLinkActive="bg-orange-500 text-white shadow-md shadow-orange-500/20"
        class="px-3.5 py-1.5 rounded-lg text-xs font-semibold tracking-wider uppercase text-slate-400 hover:text-white transition duration-200 outline-none"
      >
        Create
      </a>
    </nav>
  </div>

  @if (isMenuOpen()) {
    <nav class="md:hidden border-t border-slate-800/60 bg-slate-800/50 px-4 py-4 flex flex-col space-y-1.5 shadow-2xl">
      <a
        routerLink="/"
        [routerLinkActiveOptions]="{ exact: true }"
        routerLinkActive="bg-orange-500 text-white shadow-md shadow-orange-500/20"
        (click)="closeMenu()"
        class="px-4 py-2.5 rounded-xl text-xs font-semibold tracking-wider uppercase text-slate-400 hover:text-white hover:bg-slate-900 transition duration-200 block border border-transparent hover:border-slate-800/40 outline-none"
      >
        Home
      </a>

      <a
        routerLink="/students"
        routerLinkActive="bg-orange-500 text-white shadow-md shadow-orange-500/20"
        (click)="closeMenu()"
        class="px-4 py-2.5 rounded-xl text-xs font-semibold tracking-wider uppercase text-slate-400 hover:text-white hover:bg-slate-900 transition duration-200 block border border-transparent hover:border-slate-800/40 outline-none"
      >
        Students
      </a>

      <a
        routerLink="/create"
        routerLinkActive="bg-orange-500 text-white shadow-md shadow-orange-500/20"
        (click)="closeMenu()"
        class="px-4 py-2.5 rounded-xl text-xs font-semibold tracking-wider uppercase text-slate-400 hover:text-white hover:bg-slate-900 transition duration-200 block border border-transparent hover:border-slate-800/40 outline-none"
      >
        Create Student
      </a>
    </nav>
  }
</header>
